name: Build & Release

on:
  push:
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Cache yt-dlp binary
      uses: actions/cache@v4
      with:
        path: bin/yt-dlp*
        key: yt-dlp-${{ runner.os }}-${{ hashFiles('**/download-yt-dlp.sh') }}
        restore-keys: |
          yt-dlp-${{ runner.os }}-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v
        python -c "import app; print('✅ App imports successfully')"
    
    - name: Download yt-dlp
      run: |
        mkdir -p bin
        curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o bin/yt-dlp
        chmod +x bin/yt-dlp
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile \
          --add-data "templates:templates" \
          --add-data "static:static" \
          --add-binary "bin/yt-dlp:bin" \
          --hidden-import yt_dlp \
          --hidden-import certifi \
          --exclude-module tkinter \
          --exclude-module unittest \
          --name yt-dlp-desktop-macos-arm64 \
          --clean \
          app.py
    
    - name: Ad-hoc code sign
      run: |
        codesign --force --deep -s - dist/yt-dlp-desktop-macos-arm64
    
    - name: Verify executable
      run: |
        ls -lh dist/yt-dlp-desktop-macos-arm64
        file dist/yt-dlp-desktop-macos-arm64
        codesign -dv dist/yt-dlp-desktop-macos-arm64 2>&1 || true
    
    - name: Test artifact
      run: |
        dist/yt-dlp-desktop-macos-arm64 --version
    
    - name: Analyze build size
      run: |
        size=$(stat -c%s dist/yt-dlp-desktop-macos-arm64)
        echo "Build size: $(echo "scale=2; $size/1024/1024" | bc) MB"
    
    - name: Package as zip (preserves permissions)
      run: |
        cd dist
        chmod +x yt-dlp-desktop-macos-arm64
        zip yt-dlp-desktop-macos-arm64.zip yt-dlp-desktop-macos-arm64
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: yt-dlp-desktop-macos-arm64
        path: dist/yt-dlp-desktop-macos-arm64.zip
        retention-days: 7

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Cache yt-dlp binary
      uses: actions/cache@v4
      with:
        path: bin/yt-dlp*
        key: yt-dlp-${{ runner.os }}-${{ hashFiles('**/download-yt-dlp.sh') }}
        restore-keys: |
          yt-dlp-${{ runner.os }}-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v
        python -c "import app; print('✅ App imports successfully')"
    
    - name: Download yt-dlp
      run: |
        New-Item -ItemType Directory -Force -Path bin
        Invoke-WebRequest -Uri https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -OutFile bin/yt-dlp.exe
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile `
          --add-data "templates;templates" `
          --add-data "static;static" `
          --add-binary "bin/yt-dlp.exe;bin" `
          --hidden-import yt_dlp `
          --hidden-import certifi `
          --exclude-module tkinter `
          --exclude-module unittest `
          --name yt-dlp-desktop-windows-x64 `
          --clean `
          app.py
    
    - name: Test artifact
      run: |
        dist/yt-dlp-desktop-windows-x64.exe --version
    
    - name: Analyze build size
      run: |
        $size = (Get-Item dist/yt-dlp-desktop-windows-x64.exe).Length
        echo "Build size: $([math]::Round($size/1MB, 2)) MB"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: yt-dlp-desktop-windows-x64
        path: dist/yt-dlp-desktop-windows-x64.exe
        retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Cache yt-dlp binary
      uses: actions/cache@v4
      with:
        path: bin/yt-dlp*
        key: yt-dlp-${{ runner.os }}-${{ hashFiles('**/download-yt-dlp.sh') }}
        restore-keys: |
          yt-dlp-${{ runner.os }}-
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v
        python -c "import app; print('✅ App imports successfully')"
    
    - name: Download yt-dlp
      run: |
        mkdir -p bin
        curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o bin/yt-dlp
        chmod +x bin/yt-dlp
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile \
          --add-data "templates:templates" \
          --add-data "static:static" \
          --add-binary "bin/yt-dlp:bin" \
          --hidden-import yt_dlp \
          --hidden-import certifi \
          --exclude-module tkinter \
          --exclude-module unittest \
          --name yt-dlp-desktop-linux-x64 \
          --clean \
          app.py
    
    - name: Verify executable exists
      run: |
        ls -lh dist/yt-dlp-desktop-linux-x64
        file dist/yt-dlp-desktop-linux-x64
    
    - name: Test artifact
      run: |
        dist/yt-dlp-desktop-linux-x64 --version
    
    - name: Analyze build size
      run: |
        size=$(stat -c%s dist/yt-dlp-desktop-linux-x64)
        echo "Build size: $(echo "scale=2; $size/1024/1024" | bc) MB"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: yt-dlp-desktop-linux-x64
        path: dist/yt-dlp-desktop-linux-x64
        retention-days: 7

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/yt-dlp-desktop-macos-arm64/yt-dlp-desktop-macos-arm64.zip
          artifacts/yt-dlp-desktop-windows-x64/yt-dlp-desktop-windows-x64.exe
          artifacts/yt-dlp-desktop-linux-x64/yt-dlp-desktop-linux-x64
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

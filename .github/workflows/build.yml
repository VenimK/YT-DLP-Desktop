name: Build & Release

on:
  push:
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macos-arm64
            binary: yt-dlp_macos
            artifact: yt-dlp-desktop-macos-arm64
          - os: macos-14
            name: macos-x64
            binary: yt-dlp_macos
            artifact: yt-dlp-desktop-macos-x64
          - os: windows-latest
            name: windows-x64
            binary: yt-dlp.exe
            artifact: yt-dlp-desktop-windows-x64
          - os: ubuntu-latest
            name: linux-x64
            binary: yt-dlp
            artifact: yt-dlp-desktop-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Cache yt-dlp binary
      uses: actions/cache@v4
      with:
        path: bin/yt-dlp*
        key: yt-dlp-${{ runner.os }}-${{ hashFiles('**/download-yt-dlp.sh') }}
        restore-keys: |
          yt-dlp-${{ runner.os }}-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v
        python -c "import app; print('✅ App imports successfully')"
    
    - name: Install system dependencies (Linux)
      if: matrix.name == 'linux-x64'
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Download yt-dlp (with retry)
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 5
        max_attempts: 3
        retry_on: error
        command: |
          mkdir -p bin
          if [ "${{ runner.os }}" = "Windows" ]; then
            Invoke-WebRequest -Uri https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -OutFile bin/yt-dlp.exe
          else
            curl -L --retry 3 --retry-delay 5 https://github.com/yt-dlp/yt-dlp/releases/latest/download/${{ matrix.binary }} -o bin/yt-dlp
            chmod +x bin/yt-dlp
          fi
    
    - name: Build with PyInstaller (optimized)
      shell: bash
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          pyinstaller --onefile \
            --add-data "templates;templates" \
            --add-data "static;static" \
            --add-binary "bin/yt-dlp.exe;bin" \
            --hidden-import yt_dlp \
            --hidden-import certifi \
            --exclude-module tkinter \
            --exclude-module unittest \
            --name ${{ matrix.artifact }} \
            --clean \
            app.py
        else
          pyinstaller --onefile \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --add-binary "bin/yt-dlp:bin" \
            --hidden-import yt_dlp \
            --hidden-import certifi \
            --exclude-module tkinter \
            --exclude-module unittest \
            --name ${{ matrix.artifact }} \
            --clean \
            app.py
        fi
    
    - name: Ad-hoc code sign (macOS)
      if: startsWith(matrix.name, 'macos')
      run: |
        codesign --force --deep -s - dist/${{ matrix.artifact }}
    
    - name: Verify executable
      shell: bash
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          ls -la dist/
          file dist/${{ matrix.artifact }}.exe
        else
          ls -lh dist/${{ matrix.artifact }}
          file dist/${{ matrix.artifact }}
        fi
    
    - name: Test artifact
      shell: bash
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          dist/${{ matrix.artifact }}.exe --version
        else
          dist/${{ matrix.artifact }} --version
        fi
    
    - name: Analyze build size
      shell: bash
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          size=$(stat -c%s dist/${{ matrix.artifact }}.exe)
          echo "Build size: $(echo "scale=2; $size/1024/1024" | bc) MB"
        else
          size=$(stat -c%s dist/${{ matrix.artifact }})
          echo "Build size: $(echo "scale=2; $size/1024/1024" | bc) MB"
        fi
    
    - name: Basic functionality test
      shell: bash
      run: |
        if [ "${{ runner.os }}" = "Windows" ]; then
          timeout 10 dist/${{ matrix.artifact }}.exe --help || echo "Help test completed"
        else
          timeout 10 dist/${{ matrix.artifact }} --help || echo "Help test completed"
        fi
    
    - name: Package as zip (macOS)
      if: startsWith(matrix.name, 'macos')
      run: |
        cd dist
        chmod +x ${{ matrix.artifact }}
        zip ${{ matrix.artifact }}.zip ${{ matrix.artifact }}
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: |
          ${{ startsWith(matrix.name, 'macos') && 'dist/${{ matrix.artifact }}.zip' || (runner.os == 'Windows' && 'dist/${{ matrix.artifact }}.exe' || 'dist/${{ matrix.artifact }}') }}
        retention-days: 7

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/yt-dlp-desktop-macos-arm64/yt-dlp-desktop-macos-arm64.zip
          artifacts/yt-dlp-desktop-macos-x64/yt-dlp-desktop-macos-x64.zip
          artifacts/yt-dlp-desktop-windows-x64/yt-dlp-desktop-windows-x64.exe
          artifacts/yt-dlp-desktop-linux-x64/yt-dlp-desktop-linux-x64
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
